name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy app core --ignore-missing-imports

  test-unit:
    name: Unit Tests (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests
        run: pytest -m "not db and not slow and not pdf" -ra --tb=short

  test-db:
    name: Integration Tests (with DB)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: audit
          POSTGRES_PASSWORD: audit
          POSTGRES_DB: audit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://audit:audit@localhost:5432/audit_test
      SECRET_KEY: dGVzdHNlY3JldGtleWZvcmNpdGVzdGluZ29ubHkxMjM0NTY3
      DOCS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run DB tests with coverage
        run: pytest -m db -ra --tb=short --cov=core --cov=app --cov-report=term-missing --cov-fail-under=60

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t medical-audit-v2:ci .
