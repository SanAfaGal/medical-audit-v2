{# ─── Macro: buscador de carpeta destino (compartido por move y copy) ──── #}
{% macro dest_browser() %}
  <!-- Input de búsqueda de carpeta destino -->
  <div class="shrink-0 px-3 py-1.5 border-b border-slate-100">
    <div class="relative">
      <i class="fa-solid fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2
                 text-slate-300 text-[10px] pointer-events-none"></i>
      <input x-model="destSearchQuery"
             @input.debounce.300ms="searchDestFolders()"
             @keydown.escape="clearDestSearch()"
             type="text"
             placeholder="Buscar carpeta destino…"
             class="w-full text-xs border border-slate-200 rounded-md pl-6 pr-6 py-1
                    focus:outline-none focus:ring-1 focus:ring-sky-400 bg-white">
      <button x-show="destSearchQuery"
              @click="clearDestSearch()"
              class="absolute right-1.5 top-1/2 -translate-y-1/2
                     text-slate-300 hover:text-slate-500 transition-colors">
        <i class="fa-solid fa-xmark text-[10px]"></i>
      </button>
    </div>
  </div>
  <!-- Resultados (visibles cuando hay texto, reemplazan la lista de navegación) -->
  <div x-show="destSearchQuery.trim()" class="flex-1 overflow-y-auto py-1">
    <template x-if="destSearchLoading">
      <div class="px-3 py-4 text-[10px] text-slate-400 text-center">
        <i class="fa-solid fa-spinner fa-spin mr-1"></i>Buscando…
      </div>
    </template>
    <template x-if="!destSearchLoading && destSearchResults.length === 0">
      <div class="px-3 py-4 text-[10px] text-slate-400 italic text-center">Sin carpetas encontradas</div>
    </template>
    <template x-for="dir in destSearchResults" :key="dir.path">
      <div @click="setMoveDestination(dir.path)"
           :class="moveBrowserPath === dir.path
             ? 'bg-sky-50 text-sky-700'
             : 'hover:bg-slate-50 text-slate-700'"
           class="flex items-center gap-2 px-3 py-1.5 cursor-pointer text-xs transition-colors">
        <i class="fa-solid fa-folder text-amber-400 w-3.5 shrink-0 text-center"></i>
        <div class="min-w-0 flex-1">
          <div class="truncate font-medium" x-text="dir.name"></div>
          <div class="truncate text-[10px] text-slate-400"
               x-text="dir.path.split('/').slice(0,-1).join('/')"></div>
        </div>
        <i class="fa-solid fa-check text-sky-400 text-[9px] shrink-0"
           x-show="moveBrowserPath === dir.path"></i>
      </div>
    </template>
  </div>
{% endmacro %}

{# ─── Explorador de archivos PDF — panel lateral ─────────────────────────── #}
<div :style="explorerOpen ? `width:${panelWidth}px` : 'width:0'"
     :class="_resizing ? '' : 'transition-all duration-300'"
     class="relative flex flex-col h-full shrink-0 bg-white border-l border-slate-200 overflow-hidden"
     style="box-shadow: -4px 0 20px rgba(0,0,0,0.06)">

  <!-- ── Handle de redimensionamiento (borde izquierdo) ─────────────────── -->
  <div x-show="explorerOpen"
       @mousedown.prevent="startResize($event)"
       class="absolute left-0 top-0 bottom-0 w-1.5 z-20 cursor-col-resize group"
       title="Arrastrar para redimensionar">
    <div class="h-full w-px bg-slate-200 group-hover:bg-sky-400 group-hover:w-full transition-all duration-150 ml-0.5"></div>
    <!-- Tooltip de ancho durante resize -->
    <div x-show="_resizing"
         class="absolute top-1/2 -translate-y-1/2 left-4 bg-slate-800 text-white text-[10px] font-mono px-2 py-1 rounded-md whitespace-nowrap pointer-events-none"
         x-text="panelWidth + 'px'"></div>
  </div>

  <!-- ── Contenido del panel (sólo visible cuando está abierto) ────────── -->
  <template x-if="explorerOpen">
    <div class="flex flex-col h-full w-full">

      <!-- ── Header ───────────────────────────────────────────────────── -->
      <div class="flex items-center gap-2 px-3 py-2.5 border-b border-slate-100 shrink-0 bg-slate-50">

        <!-- Tabs de carpeta raíz -->
        <div class="flex items-center gap-0.5 shrink-0">
          <template x-for="folder in ['DRIVE', 'STAGE', 'AUDIT']" :key="folder">
            <button @click="switchRoot(folder)"
                    :class="rootFolder === folder
                      ? 'bg-sky-500 text-white border-sky-500'
                      : 'bg-white text-slate-500 border-slate-200 hover:border-sky-300 hover:text-sky-600'"
                    class="px-2 py-0.5 rounded text-[11px] font-semibold border transition-all"
                    x-text="folder"></button>
          </template>
        </div>

        <!-- Botón atrás -->
        <button @click="goUp()"
                :disabled="!currentPath || currentPath === rootFolder"
                class="p-1.5 rounded-md text-slate-400 hover:bg-slate-100 disabled:opacity-30 transition-colors"
                title="Subir un nivel">
          <i class="fa-solid fa-arrow-left text-xs"></i>
        </button>

        <!-- Input unificado de búsqueda -->
        <div class="relative flex-1 min-w-0">
          <i class="fa-solid fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2
                     text-slate-300 text-[10px] pointer-events-none"></i>
          <input x-ref="searchInput"
                 x-model="searchQuery"
                 @input.debounce.300ms="runSearch()"
                 @keydown.escape="clearSearch(); $el.blur()"
                 type="text"
                 placeholder="Buscar en carpeta actual…"
                 class="w-full text-xs border border-slate-200 rounded-md pl-6 pr-6 py-1
                        focus:outline-none focus:ring-1 focus:ring-sky-400 bg-white">
          <button x-show="searchQuery"
                  @click="clearSearch()"
                  class="absolute right-1.5 top-1/2 -translate-y-1/2
                         text-slate-300 hover:text-slate-500 transition-colors">
            <i class="fa-solid fa-xmark text-[10px]"></i>
          </button>
        </div>

        <!-- Cerrar panel -->
        <button @click="explorerOpen = false"
                class="p-1.5 rounded-md text-slate-400 hover:bg-slate-100 transition-colors"
                title="Cerrar explorador">
          <i class="fa-solid fa-xmark text-xs"></i>
        </button>
      </div>

      <!-- ── Body: lista + preview ─────────────────────────────────────── -->
      <div class="flex flex-1 min-h-0">

        <!-- Lista de entradas -->
        <div :style="`width:${listWidth}px`"
             :class="_listResizing ? '' : 'transition-none'"
             class="shrink-0 flex flex-col min-h-0 min-w-0">

          <!-- ── Cabecera de resultados (solo en búsqueda) ── -->
          <template x-if="isSearchActive()">
            <div class="px-3 py-1 border-b border-slate-100 shrink-0 flex items-center gap-1.5">
              <template x-if="searchLoading">
                <span class="text-[10px] text-slate-400">
                  <i class="fa-solid fa-spinner fa-spin mr-1"></i>Buscando…
                </span>
              </template>
              <template x-if="!searchLoading">
                <span class="text-[10px] text-slate-500"
                      x-text="`${searchResults.length} resultado(s)`"></span>
              </template>
            </div>
          </template>

          <!-- ── Lista unificada (con soporte drag & drop externo) ── -->
          <div class="flex-1 overflow-y-auto py-1 relative"
               @dragover="onExplorerDragOver($event)"
               @dragleave="onExplorerDragLeave($event)"
               @drop="onExplorerFileDrop($event)">

            <!-- Overlay drag & drop externo -->
            <div x-show="isDragOver"
                 class="absolute inset-0 z-20 rounded-md m-1 border-2 border-dashed border-sky-400 bg-sky-50/80 flex flex-col items-center justify-center gap-2 pointer-events-none">
              <i class="fa-solid fa-cloud-arrow-up text-sky-400 text-2xl"></i>
              <span class="text-xs text-sky-600 font-medium">Soltar PDFs aquí</span>
            </div>

            <template x-if="!isSearchActive() && entries.length === 0 && !creatingFolder">
              <div class="px-3 py-4 text-xs text-slate-400 italic text-center">Carpeta vacía</div>
            </template>
            <template x-if="isSearchActive() && !searchLoading && searchQuery && searchResults.length === 0">
              <div class="px-3 py-4 text-xs text-slate-400 italic text-center">Sin resultados</div>
            </template>

            <!-- ── Fila nueva carpeta (modo creatingFolder) ── -->
            <template x-if="!isSearchActive() && creatingFolder">
              <div class="flex items-center gap-1 px-2 py-1.5 border-b border-slate-100">
                <i class="fa-solid fa-folder text-amber-400 w-3.5 text-center shrink-0 text-xs"></i>
                <input x-ref="newFolderInput"
                       x-model="newFolderName"
                       @keydown.enter="createFolder()"
                       @keydown.escape="creatingFolder = false; newFolderName = ''"
                       placeholder="Nombre de la carpeta"
                       class="flex-1 text-xs border border-sky-400 rounded px-1.5 py-0.5 focus:outline-none focus:ring-1 focus:ring-sky-400 min-w-0">
                <button @mousedown.prevent="createFolder()"
                        class="shrink-0 p-0.5 rounded text-sky-600 hover:bg-sky-50 hover:text-sky-800"
                        title="Crear">
                  <i class="fa-solid fa-check text-[10px]"></i>
                </button>
                <button @mousedown.prevent="creatingFolder = false; newFolderName = ''"
                        class="shrink-0 p-0.5 rounded text-slate-400 hover:bg-slate-100 hover:text-slate-600"
                        title="Cancelar">
                  <i class="fa-solid fa-xmark text-[10px]"></i>
                </button>
              </div>
            </template>

            <template x-for="entry in isSearchActive() ? searchResults : entries" :key="entry.path">
              <div class="group relative">

                <!-- ── Modo renombrar (solo en modo normal) ── -->
                <template x-if="!isSearchActive() && renamingPath === entry.path">
                  <div class="flex items-center gap-1 px-2 py-1.5">
                    <i :class="entry.is_dir ? 'fa-solid fa-folder text-amber-400' : 'fa-solid fa-file-pdf text-red-400'"
                       class="w-3.5 text-center shrink-0 text-xs"></i>
                    <input x-ref="renameInput"
                           x-model="renameValue"
                           @keydown.enter="commitRename(entry)"
                           @keydown.escape="renamingPath = null"
                           class="flex-1 text-xs border border-sky-400 rounded px-1.5 py-0.5 focus:outline-none focus:ring-1 focus:ring-sky-400 min-w-0">
                    <!-- mousedown.prevent evita que el blur cancele antes del click -->
                    <button @mousedown.prevent="commitRename(entry)"
                            class="shrink-0 p-0.5 rounded text-sky-600 hover:bg-sky-50 hover:text-sky-800"
                            title="Confirmar">
                      <i class="fa-solid fa-check text-[10px]"></i>
                    </button>
                    <button @mousedown.prevent="renamingPath = null"
                            class="shrink-0 p-0.5 rounded text-slate-400 hover:bg-slate-100 hover:text-slate-600"
                            title="Cancelar">
                      <i class="fa-solid fa-xmark text-[10px]"></i>
                    </button>
                  </div>
                </template>

                <!-- ── Fila principal ── -->
                <template x-if="isSearchActive() || renamingPath !== entry.path">
                  <div @click="isSearchActive()
                               ? navigateToSearchResult(entry)
                               : pdfMode === 'select'
                                 ? toggleSelectEntry(entry.path)
                                 : pdfMode === 'move'
                                   ? toggleMoveEntry(entry)
                                   : pdfMode === 'copy'
                                     ? toggleCopyEntry(entry)
                                     : pdfMode === 'merge'
                                       ? (!entry.is_dir && toggleMergePdf(entry.path))
                                       : entry.is_dir ? navigateTo(entry.path) : (selectEntry(entry), confirmingDelete = null)"
                       @dblclick="!isSearchActive() && entry.is_dir && pdfMode === 'none' && navigateTo(entry.path)"
                       :draggable="pdfMode === 'none'"
                       @dragstart="pdfMode === 'none' && onDragStart($event, entry)"
                       @dragover.prevent
                       @drop="!isSearchActive() && entry.is_dir && onDrop($event, entry)"
                       :class="isSearchActive()
                         ? 'hover:bg-sky-50 text-slate-700'
                         : pdfMode === 'select' && selectedEntries.includes(entry.path)
                           ? 'bg-red-50 text-red-700 ring-1 ring-inset ring-red-200'
                           : pdfMode === 'select'
                             ? 'hover:bg-red-50/50 text-slate-700'
                             : pdfMode === 'move' && movingEntries.find(e => e.path === entry.path)
                               ? 'bg-indigo-50 text-indigo-700 ring-1 ring-inset ring-indigo-300'
                               : pdfMode === 'copy' && copyingEntries.find(e => e.path === entry.path)
                                 ? 'bg-teal-50 text-teal-700 ring-1 ring-inset ring-teal-300'
                                 : pdfMode === 'merge' && selectedPdfs.includes(entry.path)
                                   ? 'bg-amber-50 text-amber-700 ring-1 ring-inset ring-amber-300'
                                   : selectedEntry && selectedEntry.path === entry.path
                                     ? 'bg-sky-50 text-sky-700'
                                     : 'hover:bg-slate-50 text-slate-700'"
                       class="relative flex items-center gap-2 px-2.5 py-1.5 cursor-pointer select-none text-xs transition-colors">

                    <!-- Checkbox (solo en modo select) -->
                    <template x-if="!isSearchActive() && pdfMode === 'select'">
                      <input type="checkbox"
                             :checked="selectedEntries.includes(entry.path)"
                             @click.stop="toggleSelectEntry(entry.path)"
                             class="w-3.5 h-3.5 rounded shrink-0 accent-red-500 cursor-pointer">
                    </template>

                    <i :class="entry.is_dir ? 'fa-solid fa-folder text-amber-400' : 'fa-solid fa-file-pdf text-red-400'"
                       class="w-3.5 text-center shrink-0"></i>

                    <!-- En modo búsqueda: nombre + ruta padre -->
                    <div x-show="isSearchActive()" class="min-w-0 flex-1">
                      <div class="truncate text-xs font-medium" x-text="entry.name"></div>
                      <div class="truncate text-[10px] text-slate-400"
                           x-text="entry.path.split('/').slice(0,-1).join('/')"></div>
                    </div>

                    <!-- En modo normal: confirmar eliminación inline -->
                    <div x-show="!isSearchActive() && confirmingDelete === entry.path"
                         class="flex items-center gap-1 flex-1 min-w-0" @click.stop>
                      <span class="text-red-500 font-medium truncate">¿Eliminar?</span>
                      <button @click.stop="deleteEntry(entry)"
                              class="shrink-0 px-1.5 py-0.5 rounded bg-red-500 text-white text-[10px] font-semibold hover:bg-red-600">
                        Sí
                      </button>
                      <button @click.stop="confirmingDelete = null"
                              class="shrink-0 px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 text-[10px] hover:bg-slate-200">
                        No
                      </button>
                    </div>

                    <!-- En modo normal: nombre con tooltip -->
                    <span x-show="!isSearchActive() && confirmingDelete !== entry.path"
                          class="truncate flex-1 min-w-0 pr-1"
                          x-text="entry.name"
                          :title="entry.name"></span>

                    <!-- Badge conteo de archivos (solo carpetas, modo normal) -->
                    <template x-if="!isSearchActive() && entry.is_dir && entry.file_count !== null && confirmingDelete !== entry.path">
                      <span class="text-[9px] px-1.5 py-0.5 rounded font-semibold shrink-0 group-hover:hidden"
                            :style="entry.file_count === 0
                              ? 'background:rgba(239,68,68,0.1);color:#ef4444'
                              : 'background:rgba(0,0,0,0.05);color:var(--text-3,#94a3b8)'"
                            x-text="entry.file_count === 0 ? 'vacía' : entry.file_count + ' arch.'"></span>
                    </template>

                    <!-- Botones de acción flotantes (solo en modo normal, sin selección) -->
                    <div x-show="!isSearchActive() && pdfMode === 'none' && confirmingDelete !== entry.path"
                         class="absolute right-1 top-1/2 -translate-y-1/2
                                hidden group-hover:flex items-center gap-0.5
                                bg-white/95 border border-slate-100 rounded-md shadow-sm px-0.5">
                      <!-- Descargar archivo (solo archivos) -->
                      <template x-if="!entry.is_dir">
                        <a :href="`/api/explorer/download-file?institution_id=${institutionId}&period_id=${periodId}&rel_path=${encodeURIComponent(entry.path)}`"
                           download
                           class="p-1 rounded hover:bg-sky-50 text-slate-400 hover:text-sky-500 flex items-center"
                           title="Descargar archivo"
                           @click.stop>
                          <i class="fa-solid fa-download text-[9px]"></i>
                        </a>
                      </template>
                      <!-- Descargar ZIP (solo carpetas) -->
                      <template x-if="entry.is_dir">
                        <button @click.stop="downloadZip([entry.path])"
                                class="p-1 rounded hover:bg-sky-50 text-slate-400 hover:text-sky-500"
                                title="Descargar carpeta como ZIP">
                          <i class="fa-solid fa-file-zipper text-[9px]"></i>
                        </button>
                      </template>
                      <button @click.stop="startMove(entry)"
                              class="p-1 rounded hover:bg-indigo-50 text-slate-400 hover:text-indigo-600"
                              title="Mover">
                        <i class="fa-solid fa-arrow-right-arrow-left text-[9px]"></i>
                      </button>
                      <button @click.stop="startCopy(entry)"
                              class="p-1 rounded hover:bg-teal-50 text-slate-400 hover:text-teal-600"
                              title="Copiar">
                        <i class="fa-solid fa-copy text-[9px]"></i>
                      </button>
                      <button @click.stop="startRename(entry)"
                              class="p-1 rounded hover:bg-slate-100 text-slate-400 hover:text-slate-600"
                              title="Renombrar">
                        <i class="fa-solid fa-pencil text-[9px]"></i>
                      </button>
                      <button @click.stop="confirmingDelete = entry.path"
                              class="p-1 rounded hover:bg-red-50 text-slate-400 hover:text-red-500"
                              title="Eliminar">
                        <i class="fa-solid fa-trash text-[9px]"></i>
                      </button>
                    </div>

                  </div>
                </template>

              </div>
            </template>
          </div>

        </div>

        <!-- Handle de redimensionamiento entre lista y preview -->
        <div @mousedown.prevent="startListResize($event)"
             class="relative w-1.5 shrink-0 cursor-col-resize group z-10"
             style="background:transparent">
          <div class="h-full w-px mx-auto bg-slate-200 group-hover:bg-sky-400 group-hover:w-full transition-all duration-150"></div>
        </div>

        <!-- Panel derecho: preview / operaciones ──────────────────────── -->
        <div class="flex-1 flex flex-col min-h-0 min-w-0">

          <!-- ── Toolbar de operaciones ─────────────────────────────── -->
          <div class="flex items-center gap-1.5 px-3 py-2 border-b border-slate-100 shrink-0 bg-slate-50 flex-wrap">

            <!-- Volver (todos los modos excepto select y none) -->
            <template x-if="pdfMode !== 'none' && pdfMode !== 'select'">
              <button @click="pdfMode = 'none'"
                      class="flex items-center gap-1 px-2 py-1 rounded-md text-xs text-slate-500 hover:bg-white hover:text-slate-700 border border-transparent hover:border-slate-200 transition-all">
                <i class="fa-solid fa-arrow-left text-[10px]"></i>
                Volver
              </button>
            </template>

            <!-- ── Toolbar modo selección ── -->
            <template x-if="pdfMode === 'select'">
              <div class="flex items-center gap-1.5 flex-1 flex-wrap">
                <!-- Checkbox seleccionar todo -->
                <label class="flex items-center gap-1.5 px-2 py-1 rounded-md text-xs text-slate-600 hover:bg-white border border-transparent hover:border-slate-200 cursor-pointer transition-all select-none">
                  <input type="checkbox"
                         class="w-3.5 h-3.5 rounded accent-sky-500 cursor-pointer"
                         :checked="selectedEntries.length === entries.length && entries.length > 0"
                         x-effect="$el.indeterminate = selectedEntries.length > 0 && selectedEntries.length < entries.length"
                         @change="selectAllEntries()">
                  Todos
                </label>

                <!-- Eliminar lote -->
                <button @click="batchDeleteConfirm = true"
                        :disabled="!selectedEntries.length"
                        class="flex items-center gap-1 px-2.5 py-1 rounded-md text-xs font-medium bg-red-500 text-white hover:bg-red-600 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                  <i class="fa-solid fa-trash text-[10px]"></i>
                  <span>Eliminar</span>
                  <span x-show="selectedEntries.length" class="font-semibold"
                        x-text="`(${selectedEntries.length})`"></span>
                </button>

                <!-- Descargar selección como ZIP -->
                <button @click="downloadZip(selectedEntries)"
                        :disabled="!selectedEntries.length"
                        class="flex items-center gap-1 px-2.5 py-1 rounded-md text-xs font-medium bg-sky-500 text-white hover:bg-sky-600 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                  <i class="fa-solid fa-file-zipper text-[10px]"></i>
                  <span>Descargar</span>
                  <span x-show="selectedEntries.length" class="font-semibold"
                        x-text="`(${selectedEntries.length})`"></span>
                </button>

                <!-- Cancelar -->
                <button @click="pdfMode = 'none'; selectedEntries = []"
                        class="flex items-center gap-1 px-2 py-1 rounded-md text-xs text-slate-500 hover:bg-white hover:text-slate-700 border border-transparent hover:border-slate-200 transition-all ml-auto">
                  <i class="fa-solid fa-xmark text-[10px]"></i>
                  Cancelar
                </button>
              </div>
            </template>

            <!-- ── Toolbar modo normal ── -->
            <template x-if="pdfMode === 'none'">
              <div class="flex items-center gap-1.5 flex-1 flex-wrap">

                <!-- Dividir + Reordenar (solo si hay PDF seleccionado) -->
                <template x-if="selectedEntry && !selectedEntry.is_dir">
                  <div class="flex items-center gap-1.5">
                    <button @click="pdfMode = 'split'"
                            class="flex items-center gap-1 px-2.5 py-1 rounded-md text-xs font-medium bg-white border border-slate-200 text-slate-600 hover:border-sky-300 hover:text-sky-600 transition-all">
                      <i class="fa-solid fa-scissors text-[10px]"></i>
                      Dividir
                    </button>
                    <button @click="startReorder()"
                            class="flex items-center gap-1 px-2.5 py-1 rounded-md text-xs font-medium bg-white border border-slate-200 text-slate-600 hover:border-violet-300 hover:text-violet-600 transition-all">
                      <i class="fa-solid fa-sort text-[10px]"></i>
                      Reordenar
                    </button>
                  </div>
                </template>

                <!-- Unir PDFs -->
                <template x-if="entries.some(e => !e.is_dir)">
                  <button @click="startMerge()"
                          class="flex items-center gap-1 px-2.5 py-1 rounded-md text-xs font-medium bg-white border border-slate-200 text-slate-600 hover:border-amber-300 hover:text-amber-600 transition-all">
                    <i class="fa-solid fa-object-group text-[10px]"></i>
                    Unir PDFs
                  </button>
                </template>

                <!-- Separador flexible -->
                <div class="flex-1"></div>

                <!-- ── Action strip: Carpeta · Subir · Seleccionar ── -->
                <div class="flex items-stretch divide-x divide-slate-200 border border-slate-200 rounded-lg bg-white shadow-sm">

                  <!-- Nueva carpeta -->
                  <button @click="creatingFolder = true; $nextTick(() => $refs.newFolderInput && $refs.newFolderInput.focus())"
                          class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-medium text-amber-700 bg-white hover:bg-amber-50 transition-colors group rounded-l-lg"
                          title="Crear carpeta">
                    <i class="fa-solid fa-folder-plus text-amber-500 group-hover:text-amber-600 text-[11px]"></i>
                    <span class="hidden sm:inline">Nueva carpeta</span>
                  </button>

                  <!-- Subir (dropdown) -->
                  <div class="relative flex">
                    <button @click="uploadMenuOpen = !uploadMenuOpen"
                            class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-medium text-sky-700 bg-white hover:bg-sky-50 transition-colors group"
                            :class="uploadMenuOpen && 'bg-sky-50'"
                            title="Subir archivos">
                      <i class="fa-solid fa-arrow-up-from-bracket text-sky-500 group-hover:text-sky-600 text-[11px]"></i>
                      <span class="hidden sm:inline">Subir</span>
                      <i class="fa-solid fa-chevron-down text-sky-400 text-[8px] transition-transform duration-150"
                         :class="uploadMenuOpen && 'rotate-180'"></i>
                    </button>

                    <!-- Dropdown menu -->
                    <div x-show="uploadMenuOpen"
                         @click.outside="uploadMenuOpen = false"
                         x-transition:enter="transition ease-out duration-100"
                         x-transition:enter-start="opacity-0 scale-95 -translate-y-1"
                         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                         x-transition:leave="transition ease-in duration-75"
                         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                         x-transition:leave-end="opacity-0 scale-95 -translate-y-1"
                         class="absolute right-0 top-full mt-1 z-30 w-44 bg-white border border-slate-200 rounded-xl shadow-lg overflow-hidden origin-top-right">
                      <button @click="$refs.uploadInput.click(); uploadMenuOpen = false"
                              class="flex items-center gap-2.5 w-full px-3 py-2 text-xs text-slate-700 hover:bg-sky-50 hover:text-sky-700 transition-colors">
                        <i class="fa-solid fa-file-pdf text-red-400 w-3.5 text-center"></i>
                        <div class="text-left">
                          <div class="font-medium">Archivos PDF</div>
                          <div class="text-[10px] text-slate-400">Uno o varios PDFs</div>
                        </div>
                      </button>
                      <div class="h-px bg-slate-100 mx-2"></div>
                      <button @click="$refs.uploadFolderInput.click(); uploadMenuOpen = false"
                              class="flex items-center gap-2.5 w-full px-3 py-2 text-xs text-slate-700 hover:bg-sky-50 hover:text-sky-700 transition-colors">
                        <i class="fa-solid fa-upload text-amber-400 w-3.5 text-center"></i>
                        <div class="text-left">
                          <div class="font-medium">Carpeta completa</div>
                          <div class="text-[10px] text-slate-400">Sube todos los PDFs</div>
                        </div>
                      </button>
                    </div>
                  </div>

                  <!-- Seleccionar -->
                  <button @click="startSelectMode()"
                          class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-medium text-slate-600 bg-white hover:bg-slate-100 transition-colors group rounded-r-lg"
                          title="Seleccionar elementos">
                    <i class="fa-solid fa-check-double text-slate-400 group-hover:text-slate-600 text-[11px]"></i>
                    <span class="hidden sm:inline">Seleccionar</span>
                  </button>

                </div>

              </div>
            </template>

          </div>

          <!-- Inputs de archivo ocultos -->
          <input type="file" multiple accept=".pdf" x-ref="uploadInput" class="hidden"
                 @change="uploadFiles($event.target.files, []); $event.target.value = ''">
          <input type="file" x-ref="uploadFolderInput" class="hidden"
                 webkitdirectory
                 @change="uploadFiles($event.target.files, [...$event.target.files].map(f => f.webkitRelativePath)); $event.target.value = ''">

          <!-- Barra de progreso de upload -->
          <template x-if="uploadProgress !== null">
            <div class="shrink-0 px-3 py-2 bg-sky-50 border-b border-sky-100 flex items-center gap-2">
              <i class="fa-solid fa-arrow-up-from-bracket text-sky-500 text-[10px] shrink-0"></i>
              <div class="flex-1 min-w-0">
                <div class="flex justify-between items-center mb-1">
                  <span class="text-[10px] text-sky-700">
                    Subiendo archivos…
                  </span>
                </div>
                <div class="h-1.5 bg-sky-200 rounded-full overflow-hidden">
                  <div class="h-full bg-sky-500 rounded-full transition-all duration-300"
                       style="width:0%"></div>
                </div>
              </div>
            </div>
          </template>

          <!-- ── Modo Select: panel informativo ───────────────────────── -->
          <template x-if="pdfMode === 'select'">
            <div class="flex-1 flex flex-col items-center justify-center gap-3 text-slate-300 p-6">
              <i class="fa-solid fa-check-double text-4xl text-slate-200"></i>
              <div class="text-center">
                <div class="text-sm font-medium text-slate-400 mb-1">Modo selección</div>
                <div class="text-xs text-slate-400"
                     x-text="selectedEntries.length
                       ? `${selectedEntries.length} elemento(s) seleccionado(s)`
                       : 'Haz clic en elementos de la lista para seleccionarlos'">
                </div>
              </div>
            </div>
          </template>

          <!-- ── Preview (modo none) ────────────────────────────────── -->
          <template x-if="pdfMode === 'none'">
            <div class="flex-1 min-h-0">
              <template x-if="previewUrl">
                <iframe :src="previewUrl"
                        class="w-full h-full border-0"
                        title="Vista previa PDF"></iframe>
              </template>
              <template x-if="!previewUrl">
                <div class="flex flex-col items-center justify-center h-full text-slate-300 gap-3">
                  <i class="fa-solid fa-file-pdf text-5xl"></i>
                  <span class="text-sm">Selecciona un PDF para previsualizarlo</span>
                </div>
              </template>
            </div>
          </template>

          <!-- ── Modo Split ─────────────────────────────────────────── -->
          <template x-if="pdfMode === 'split'">
            <div class="flex-1 flex flex-col gap-4 p-4 overflow-y-auto">
              <div class="text-sm font-semibold text-slate-700">
                Dividir: <span class="font-normal text-slate-500" x-text="selectedEntry && selectedEntry.name"></span>
              </div>
              <div class="space-y-3">
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1">
                    Rangos de páginas (ej: <code class="text-sky-600">1-3, 5</code>)
                  </label>
                  <input x-model="splitRanges"
                         type="text"
                         placeholder="Dejar vacío para dividir página a página"
                         class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400">
                </div>
                <button @click="executeSplit()"
                        class="w-full py-2 rounded-lg bg-sky-500 text-white text-sm font-semibold hover:bg-sky-600 transition-colors">
                  <i class="fa-solid fa-scissors mr-1.5"></i>
                  Dividir PDF
                </button>
              </div>
            </div>
          </template>

          <!-- ── Modo Merge ─────────────────────────────────────────── -->
          <template x-if="pdfMode === 'merge'">
            <div class="flex-1 flex flex-col gap-4 p-4 overflow-y-auto">
              <div class="text-sm font-semibold text-slate-700">Unir PDFs seleccionados</div>
              <div class="text-xs text-slate-500">
                Selecciona los PDFs en la lista de la izquierda (<span x-text="selectedPdfs.length"></span> seleccionados)
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Nombre del archivo resultado</label>
                <input x-model="mergeOutputName"
                       type="text"
                       placeholder="resultado.pdf"
                       class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
              </div>
              <!-- Lista de PDFs seleccionados con orden -->
              <div class="space-y-1">
                <div class="text-xs font-medium text-slate-500">Orden de fusión:</div>
                <template x-for="(p, i) in selectedPdfs" :key="p">
                  <div class="flex items-center gap-2 text-xs text-slate-600 bg-slate-50 rounded-md px-2 py-1.5">
                    <span class="text-slate-400 font-mono w-4" x-text="i+1"></span>
                    <span class="truncate flex-1" x-text="p.split('/').pop()"></span>
                    <button @click="selectedPdfs.splice(i,1)"
                            class="text-slate-300 hover:text-red-400 transition-colors">
                      <i class="fa-solid fa-xmark text-[10px]"></i>
                    </button>
                  </div>
                </template>
              </div>
              <button @click="executeMerge()"
                      :disabled="selectedPdfs.length < 2"
                      class="w-full py-2 rounded-lg bg-amber-500 text-white text-sm font-semibold hover:bg-amber-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                <i class="fa-solid fa-object-group mr-1.5"></i>
                Unir PDFs
              </button>
            </div>
          </template>

          <!-- ── Modo Move ─────────────────────────────────────────── -->
          <template x-if="pdfMode === 'move'">
            <div class="flex-1 flex flex-col min-h-0">

              <!-- Cabecera -->
              <div class="px-3 py-2 border-b border-slate-100 shrink-0">
                <div class="flex items-center gap-1.5 mb-1.5">
                  <i class="fa-solid fa-arrow-right-arrow-left text-indigo-500 text-[10px]"></i>
                  <span class="text-xs font-semibold text-slate-700">Mover
                    <span class="font-normal text-indigo-600"
                          x-text="movingEntries.length ? `${movingEntries.length} elemento(s)` : 'sin selección'"></span>
                  </span>
                </div>
                <p class="text-[10px] text-slate-400">Haz clic en los elementos de la lista para seleccionar/deseleccionar. Luego navega a la carpeta destino y pulsa <strong>Mover aquí</strong>.</p>
              </div>

              {{ dest_browser() }}

              <!-- Navegador de destino (oculto al buscar) -->
              <div x-show="!destSearchQuery.trim()"
                   class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 border-b border-slate-100 bg-slate-50">
                <button @click="moveBrowserUp()"
                        :disabled="!moveBrowserPath || moveBrowserPath === rootFolder"
                        class="p-1 rounded text-slate-400 hover:bg-slate-200 disabled:opacity-30 transition-colors">
                  <i class="fa-solid fa-arrow-left text-[10px]"></i>
                </button>
                <span class="text-[10px] text-slate-500 truncate flex-1 min-w-0 font-mono"
                      x-text="moveBrowserPath || rootFolder"></span>
              </div>

              <!-- Lista de subcarpetas (oculta al buscar) -->
              <div x-show="!destSearchQuery.trim()" class="flex-1 overflow-y-auto py-1">
                <template x-if="moveBrowserEntries.length === 0">
                  <div class="px-3 py-4 text-[10px] text-slate-400 italic text-center">Sin subcarpetas</div>
                </template>
                <template x-for="dir in moveBrowserEntries" :key="dir.path">
                  <div @click="loadMoveBrowser(dir.path)"
                       class="flex items-center gap-2 px-3 py-1.5 cursor-pointer hover:bg-indigo-50 text-xs text-slate-700 transition-colors">
                    <i class="fa-solid fa-folder text-amber-400 w-3.5 shrink-0 text-center"></i>
                    <span class="truncate" x-text="dir.name"></span>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-[8px] ml-auto shrink-0"></i>
                  </div>
                </template>
              </div>

              <!-- Botón confirmar -->
              <div class="shrink-0 px-3 py-2.5 border-t border-slate-100 bg-slate-50">
                <button @click="executeMove()"
                        :disabled="!movingEntries.length"
                        class="w-full py-2 rounded-lg bg-indigo-500 text-white text-xs font-semibold hover:bg-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                  <i class="fa-solid fa-folder-arrow-down mr-1.5"></i>
                  Mover aquí
                </button>
              </div>

            </div>
          </template>

          <!-- ── Modo Copy ──────────────────────────────────────────── -->
          <template x-if="pdfMode === 'copy'">
            <div class="flex-1 flex flex-col min-h-0">

              <!-- Cabecera -->
              <div class="px-3 py-2 border-b border-slate-100 shrink-0">
                <div class="flex items-center gap-1.5 mb-1.5">
                  <i class="fa-solid fa-copy text-teal-500 text-[10px]"></i>
                  <span class="text-xs font-semibold text-slate-700">Copiar
                    <span class="font-normal text-teal-600"
                          x-text="copyingEntries.length ? `${copyingEntries.length} elemento(s)` : 'sin selección'"></span>
                  </span>
                </div>
                <p class="text-[10px] text-slate-400">Haz clic en los elementos de la lista para seleccionar/deseleccionar. Luego navega a la carpeta destino y pulsa <strong>Copiar aquí</strong>.</p>
              </div>

              {{ dest_browser() }}

              <!-- Navegador de destino (oculto al buscar) -->
              <div x-show="!destSearchQuery.trim()"
                   class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 border-b border-slate-100 bg-slate-50">
                <button @click="moveBrowserUp()"
                        :disabled="!moveBrowserPath || moveBrowserPath === rootFolder"
                        class="p-1 rounded text-slate-400 hover:bg-slate-200 disabled:opacity-30 transition-colors">
                  <i class="fa-solid fa-arrow-left text-[10px]"></i>
                </button>
                <span class="text-[10px] text-slate-500 truncate flex-1 min-w-0 font-mono"
                      x-text="moveBrowserPath || rootFolder"></span>
              </div>

              <!-- Lista de subcarpetas (oculta al buscar) -->
              <div x-show="!destSearchQuery.trim()" class="flex-1 overflow-y-auto py-1">
                <template x-if="moveBrowserEntries.length === 0">
                  <div class="px-3 py-4 text-[10px] text-slate-400 italic text-center">Sin subcarpetas</div>
                </template>
                <template x-for="dir in moveBrowserEntries" :key="dir.path">
                  <div @click="loadMoveBrowser(dir.path)"
                       class="flex items-center gap-2 px-3 py-1.5 cursor-pointer hover:bg-teal-50 text-xs text-slate-700 transition-colors">
                    <i class="fa-solid fa-folder text-amber-400 w-3.5 shrink-0 text-center"></i>
                    <span class="truncate" x-text="dir.name"></span>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-[8px] ml-auto shrink-0"></i>
                  </div>
                </template>
              </div>

              <!-- Botón confirmar -->
              <div class="shrink-0 px-3 py-2.5 border-t border-slate-100 bg-slate-50">
                <button @click="executeCopy()"
                        :disabled="!copyingEntries.length"
                        class="w-full py-2 rounded-lg bg-teal-500 text-white text-xs font-semibold hover:bg-teal-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                  <i class="fa-solid fa-copy mr-1.5"></i>
                  Copiar aquí
                </button>
              </div>

            </div>
          </template>

          <!-- ── Modo Reorder ───────────────────────────────────────── -->
          <template x-if="pdfMode === 'reorder'">
            <div class="flex-1 flex flex-col min-h-0">
              <div class="px-4 py-2 border-b border-slate-100 shrink-0 flex items-center justify-between">
                <span class="text-xs font-medium text-slate-600">Arrastra las páginas para reordenar</span>
                <button @click="executeReorder()"
                        class="px-3 py-1.5 rounded-lg bg-violet-500 text-white text-xs font-semibold hover:bg-violet-600 transition-colors">
                  <i class="fa-solid fa-floppy-disk mr-1"></i>
                  Guardar orden
                </button>
              </div>
              <div class="flex-1 overflow-y-auto p-3">
                <template x-if="thumbnails.length === 0">
                  <div class="flex items-center justify-center h-full text-slate-400 text-sm">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i>
                    Cargando miniaturas…
                  </div>
                </template>
                <div class="grid grid-cols-3 gap-2">
                  <template x-for="(imgIdx, pos) in pageOrder" :key="imgIdx">
                    <div draggable="true"
                         @dragstart="reorderDragStart($event, pos)"
                         @dragover.prevent
                         @drop="reorderDrop($event, pos)"
                         class="relative rounded-lg overflow-hidden border-2 border-transparent hover:border-violet-400 cursor-grab active:cursor-grabbing transition-colors bg-slate-50">
                      <img :src="'data:image/png;base64,' + thumbnails[imgIdx]"
                           class="w-full h-auto block"
                           :alt="'Página ' + (imgIdx+1)">
                      <div class="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-[10px] text-center py-0.5"
                           x-text="'Pág. ' + (imgIdx+1)"></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

        </div>
      </div>

    </div>
  </template>
</div>

<!-- ── Modal confirmación eliminación en lote ───────────────────────────── -->
<template x-teleport="body">
  <div x-show="batchDeleteConfirm"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
       @click.self="batchDeleteConfirm = false">
    <div x-show="batchDeleteConfirm"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         class="bg-white rounded-2xl shadow-2xl w-80 p-6 flex flex-col gap-4">
      <div class="flex items-start gap-3">
        <div class="shrink-0 w-9 h-9 rounded-full bg-red-100 flex items-center justify-center">
          <i class="fa-solid fa-trash text-red-500 text-sm"></i>
        </div>
        <div>
          <div class="text-sm font-semibold text-slate-800">
            ¿Eliminar <span x-text="selectedEntries.length"></span> elemento(s)?
          </div>
          <p class="text-xs text-slate-500 mt-1">
            Esto incluye carpetas y todo su contenido. Esta acción no se puede deshacer.
          </p>
        </div>
      </div>
      <div class="flex gap-2 justify-end">
        <button @click="batchDeleteConfirm = false"
                class="px-3 py-1.5 rounded-lg text-xs text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
          Cancelar
        </button>
        <button @click="executeBatchDelete()"
                class="px-3 py-1.5 rounded-lg text-xs font-semibold text-white bg-red-500 hover:bg-red-600 transition-colors">
          <i class="fa-solid fa-trash mr-1"></i>
          Eliminar
        </button>
      </div>
    </div>
  </div>
</template>

<!-- ── Toast stack global (visible aunque el panel esté cerrado) ─────────── -->
<template x-teleport="body">
  <div class="fixed bottom-5 right-5 z-50 flex flex-col-reverse gap-2 items-end max-w-xs pointer-events-none">
    <template x-for="t in toasts" :key="t.id">
      <div class="pointer-events-auto w-full"
           x-show="true"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 translate-y-2">
        <div :class="{
               'border-emerald-200 text-emerald-800 shadow-emerald-100': t.type === 'ok',
               'border-sky-200    text-sky-800    shadow-sky-100':    t.type === 'loading',
               'border-amber-200  text-amber-800  shadow-amber-100':  t.type === 'warn',
               'border-red-200    text-red-800    shadow-red-100':    t.type === 'err'
             }"
             class="bg-white px-4 py-3 rounded-xl border text-xs flex items-center gap-2.5 shadow-lg">
          <i :class="{
               'fa-solid fa-circle-check text-emerald-500':       t.type === 'ok',
               'fa-solid fa-spinner fa-spin text-sky-500':        t.type === 'loading',
               'fa-solid fa-triangle-exclamation text-amber-500': t.type === 'warn',
               'fa-solid fa-circle-xmark text-red-500':           t.type === 'err'
             }"
             class="shrink-0"></i>
          <span x-text="t.message" class="flex-1"></span>
          <button @click="toasts = toasts.filter(x => x.id !== t.id)"
                  class="opacity-40 hover:opacity-80 transition-opacity ml-1">
            <i class="fa-solid fa-xmark text-[10px]"></i>
          </button>
        </div>
      </div>
    </template>
  </div>
</template>
