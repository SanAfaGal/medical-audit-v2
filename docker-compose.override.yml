# Sobreescrituras para desarrollo local.
# Docker Compose lo aplica automáticamente encima de docker-compose.yml
services:
  adminer:
    container_name: medical-audit-dev-adminer
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    container_name: medical-audit-dev-prometheus
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    container_name: medical-audit-dev-grafana
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  grafana_data:
